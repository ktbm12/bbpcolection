services:
  - type: web
    name: bbp-web
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free # Change to starter/pro for production
    envVars:
      - key: PORT
        value: "10000"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: bbp-web.onrender.com # Change this to your actual domain
      - key: DATABASE_URL
        fromDatabase:
          name: bbp-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: bbp-redis
          property: connectionString
      - key: WEB_CONCURRENCY
        value: 1
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    dockerCommand: /start-celerybeat
    plan: free
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: bbp-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: bbp-redis
          property: connectionString

  - type: redis
    name: bbp-redis
    plan: free
    ipAllowList: [] # Only allow internal connections

databases:
  - name: bbp-db
    plan: free
