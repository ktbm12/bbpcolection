{% extends "base.html" %}
{% load static %}

{% block title %}Contact Us - BBP Collection{% endblock %}

{% block content %}
<div class="pt-32 pb-24 bg-white overflow-hidden">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-20 animate-reveal">
            <p class="text-yellow-600 text-xs tracking-[0.4em] uppercase mb-4 font-black">Stay in touch</p>
            <h1 class="text-5xl md:text-7xl font-serif font-bold text-black mb-6">Contact <span class="text-yellow-600 italic">BBP</span></h1>
            <div class="w-24 h-1 bg-yellow-600 mx-auto"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
            <!-- Contact Info -->
            <div class="lg:col-span-5 space-y-12 animate-reveal">
                <div>
                    <h3 class="text-2xl font-bold mb-8">Our Contact Details</h3>
                    <div class="space-y-8">
                        <div class="flex items-start gap-6 group">
                            <div class="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center text-yellow-600 group-hover:bg-yellow-600 group-hover:text-white transition-all duration-500">
                                <i class="fab fa-whatsapp text-xl"></i>
                            </div>
                            <div>
                                <p class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-1">WhatsApp</p>
                                <p class="text-lg font-bold text-gray-900">+1 (XXX) XXX-XXXX</p>
                            </div>
                        </div>
                        <div class="flex items-start gap-6 group">
                            <div class="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center text-yellow-600 group-hover:bg-yellow-600 group-hover:text-white transition-all duration-500">
                                <i class="far fa-envelope text-xl"></i>
                            </div>
                            <div>
                                <p class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-1">Email</p>
                                <p class="text-lg font-bold text-gray-900">contact@bbpcollection.com</p>
                            </div>
                        </div>
                        <div class="flex items-start gap-6 group">
                            <div class="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center text-yellow-600 group-hover:bg-yellow-600 group-hover:text-white transition-all duration-500">
                                <i class="fas fa-map-marker-alt text-xl"></i>
                            </div>
                            <div>
                                <p class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-1">Office</p>
                                <p class="text-lg font-bold text-gray-900">United States</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="text-2xl font-bold mb-8">Follow Us</h3>
                    <div class="flex gap-4">
                        <a href="#" class="w-14 h-14 bg-gray-50 rounded-full flex items-center justify-center text-gray-900 hover:bg-yellow-600 hover:text-white transition-all transform hover:scale-110">
                            <i class="fab fa-instagram text-xl"></i>
                        </a>
                        <a href="#" class="w-14 h-14 bg-gray-50 rounded-full flex items-center justify-center text-gray-900 hover:bg-yellow-600 hover:text-white transition-all transform hover:scale-110">
                            <i class="fab fa-facebook-f text-xl"></i>
                        </a>
                        <a href="#" class="w-14 h-14 bg-gray-50 rounded-full flex items-center justify-center text-gray-900 hover:bg-yellow-600 hover:text-white transition-all transform hover:scale-110">
                            <i class="fab fa-tiktok text-xl"></i>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="lg:col-span-7 animate-reveal" style="animation-delay: 200ms">
                <div class="bg-gray-50 p-10 sm:p-16 rounded-[3rem] border border-gray-100 shadow-sm relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-yellow-600/5 rounded-full blur-3xl"></div>
                    
                    <form action="#" method="POST" class="space-y-8 relative z-10">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 ml-1">Full Name</label>
                                <input type="text" placeholder="Ex: Marie K." class="w-full bg-white border border-gray-100 px-6 py-4 rounded-2xl focus:border-yellow-600 focus:ring-0 transition outline-none">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 ml-1">Email</label>
                                <input type="email" placeholder="your@email.com" class="w-full bg-white border border-gray-100 px-6 py-4 rounded-2xl focus:border-yellow-600 focus:ring-0 transition outline-none">
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 ml-1">Subject</label>
                            <input type="text" placeholder="How can we help you?" class="w-full bg-white border border-gray-100 px-6 py-4 rounded-2xl focus:border-yellow-600 focus:ring-0 transition outline-none">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 ml-1">Message</label>
                            <textarea rows="6" placeholder="Your message..." class="w-full bg-white border border-gray-100 px-6 py-4 rounded-2xl focus:border-yellow-600 focus:ring-0 transition outline-none resize-none"></textarea>
                        </div>
                        <button type="submit" class="w-full py-5 bg-black text-white rounded-2xl font-black uppercase tracking-[0.2em] text-xs hover:bg-yellow-600 transition-all shadow-xl shadow-black/10 active:scale-[0.98]">
                            Send Message
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
@keyframes reveal {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
.animate-reveal {
    animation: reveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
}
</style>
{% endblock %}
