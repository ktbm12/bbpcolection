{% extends 'base.html' %}
{% load static %}

{% block title %}Payment Cancelled - BBP Collection{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-[2.5rem] shadow-xl p-10 text-center border border-gray-100">
            <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-6 text-gray-400">
                <i class="fas fa-times text-3xl"></i>
            </div>
            
            <h1 class="text-3xl font-black text-gray-900 mb-4">Payment Cancelled</h1>
            <p class="text-gray-500 mb-8">No worries! Your payment was not processed. You can try again or check your cart contents.</p>
            
            <div class="flex flex-col gap-3">
                <a href="{% url 'product:checkout' %}" class="w-full py-4 bg-yellow-600 hover:bg-yellow-700 text-white font-black uppercase tracking-widest rounded-2xl transition-all shadow-lg shadow-yellow-600/20">
                    Try Again
                </a>
                <a href="{% url 'product:cart_detail' %}" class="w-full py-4 bg-gray-50 hover:bg-gray-100 text-gray-500 font-bold rounded-2xl transition-all">
                    Return to Cart
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
