{% load static %}
<section class="py-24 bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col md:flex-row md:items-end justify-between mb-16 gap-8">
            <div>
                <p class="text-yellow-600 font-black uppercase tracking-[0.4em] text-[10px] mb-4">Inspiration</p>
                <h2 class="text-5xl font-serif font-bold text-gray-900 mb-0">The seasonal <br> <span class="italic underline decoration-yellow-600/30">Lookbook</span></h2>
            </div>
            <p class="max-w-md text-gray-500 text-lg leading-relaxed font-light">
                Discover the most requested styles and textures of the season, curated by our expert stylists.
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-6 h-auto md:h-[800px]">
            <!-- Large Card -->
            <div class="md:col-span-8 group relative rounded-[3rem] overflow-hidden cursor-pointer shadow-2xl skeleton">
                <img src="https://images.unsplash.com/photo-1620331311520-246422fd82f9?auto=format&fit=crop&q=80&w=1200" 
                     alt="Signature Waves" 
                     class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110 img-fade-in"
                     onload="this.classList.add('img-loaded'); this.parentElement.classList.remove('skeleton')">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-60 group-hover:opacity-80 transition-opacity"></div>
                <div class="absolute bottom-12 left-12 text-white">
                    <p class="text-[10px] font-black uppercase tracking-[0.3em] text-yellow-500 mb-2">Style 01</p>
                    <h3 class="text-4xl font-serif font-bold mb-4">Velvet Waves Collection</h3>
                    <div class="w-12 h-1 overflow-hidden">
                        <div class="w-full h-full bg-yellow-600 translate-x-[-100%] group-hover:translate-x-0 transition-transform duration-700"></div>
                    </div>
                </div>
            </div>

            <!-- Small Vertical Grid -->
            <div class="md:col-span-4 flex flex-col gap-6">
                <!-- Card 02 -->
                <div class="h-1/2 group relative rounded-[3rem] overflow-hidden cursor-pointer shadow-xl skeleton">
                    <img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?auto=format&fit=crop&q=80&w=1000" 
                         alt="Straight Elegance" 
                         class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110 img-fade-in"
                         onload="this.classList.add('img-loaded'); this.parentElement.classList.remove('skeleton')">
                    <div class="absolute inset-0 bg-black/40 group-hover:bg-black/20 transition-colors"></div>
                    <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <span class="px-6 py-3 bg-white/10 backdrop-blur-md rounded-full text-white text-[10px] font-black uppercase tracking-widest border border-white/20">View Collection</span>
                    </div>
                </div>
                <!-- Card 03 (Decorative/Info) -->
                <div class="h-1/2 bg-gray-950 rounded-[3rem] p-12 flex flex-col justify-between border border-white/5 relative overflow-hidden group">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-yellow-600/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2 group-hover:bg-yellow-600/20 transition-colors"></div>
                    <div>
                        <i class="fas fa-quote-left text-yellow-600 text-3xl mb-6"></i>
                        <h4 class="text-2xl font-serif text-white italic leading-snug">"Quality hair is the best accessory a woman can have."</h4>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="h-px flex-1 bg-white/10"></div>
                        <span class="text-white/40 text-[9px] font-black uppercase tracking-widest">BBP Elite</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
